name: Kotlin Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z format.
        required: true
        type: string
      source_sha:
        description: Source commit from the actr monorepo.
        required: true
        type: string
      source_tag:
        description: Source tag from the actr monorepo.
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
      - name: Validate package-sync repository
        run: |
          test -f README.md
          test -f .github/workflows/release.yml
      - name: Checkout source repository
        env:
          SOURCE_REPOSITORY: https://github.com/Actrium/actr
        run: |
          rm -rf source-checkout
          git clone --depth 1 --branch "${{ inputs.source_tag }}" "${SOURCE_REPOSITORY}" source-checkout
          actual_sha=$(git -C source-checkout rev-parse HEAD)
          test "${actual_sha}" = "${{ inputs.source_sha }}"
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Install UniFFI bindgen
        run: cargo install --locked uniffi --version 0.30.0 --features cli --bin uniffi-bindgen
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"
      - name: Build Android bindings
        working-directory: source-checkout/bindings/kotlin
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./build-android.sh
      - name: Publish to GitHub Packages
        working-directory: source-checkout/bindings/kotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./gradlew :actr-kotlin:assembleRelease :actr-kotlin:publish \
            --no-daemon \
            -PactrGroup=io.actrium \
            -PactrVersion=${{ inputs.version }} \
            -PactrPublishUrl=https://maven.pkg.github.com/${{ github.repository }}
      - name: Write release metadata
        run: |
          python3 - "${{ inputs.version }}" "${{ inputs.source_tag }}" "${{ inputs.source_sha }}" <<'PY'
          from __future__ import annotations

          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": sys.argv[1],
              "source_repository": "https://github.com/Actrium/actr",
              "source_tag": sys.argv[2],
              "source_sha": sys.argv[3],
              "coordinate": f"io.actrium:actr:{sys.argv[1]}",
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          Path("release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY
      - name: Commit release metadata
        run: |
          git config user.name "Harry"
          git config user.email "128583280+kaito-harry@users.noreply.github.com"
          git add release-metadata.json
          git commit -m "chore(release): publish v${{ inputs.version }}" || exit 0
          git push origin main
      - name: Tag release
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat <<EOF > release-notes.md
          Source repository: https://github.com/Actrium/actr
          Source tag: ${{ inputs.source_tag }}
          Source sha: ${{ inputs.source_sha }}

          Published Maven coordinate:
          io.actrium:actr:${{ inputs.version }}
          EOF
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file release-notes.md
